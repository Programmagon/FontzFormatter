<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>// FONTZ // Unicode Generator //</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cyber-bg"></div>
  <div class="scanlines"></div>

  <div class="container">
    <header>
      <h1 class="neon-text">FONTZ</h1>
      <p class="subtitle">// UNICODE FONT CONVERTER //</p>
    </header>

    <main class="glass-panel">
      <div class="input-group">
        <label for="text-input" class="cyber-label">INPUT_STRING_</label>
        <textarea id="text-input" placeholder="Type your text here to translate..."></textarea>
      </div>

      <div class="output-section">
        <h2 class="cyber-label">CONVERTED_OUTPUTS_</h2>
        <div id="output-list" class="output-list">
          </div>
      </div>
    </main>
  </div>

  <script src="unicode-library.js"></script>
  <script src="script.js"></script>
</body>
</html>
