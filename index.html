<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Font Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-purple: #b026ff;
            --neon-cyan: #00f3ff;
            --dark-bg: #0b0114;
            --glass-bg: rgba(255, 0, 255, 0.05);
            --glass-border: rgba(255, 0, 255, 0.2);
            --text-color: #fce8ff;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            /* Cyberpunk Grid Background */
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-color);
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 0 0 5px var(--neon-pink), 0 0 15px var(--neon-pink), 0 0 30px var(--neon-purple);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-container {
            margin-bottom: 3rem;
            position: relative;
        }

        /* Glassmorphism Input */
        input[type="text"] {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.5rem;
            font-family: inherit;
            color: #fff;
            background: rgba(11, 1, 20, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 10px rgba(0, 243, 255, 0.2);
            border-color: #fff;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #results {
            display: grid;
            gap: 1.5rem;
        }

        /* Glassmorphism Cards */
        .font-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 0, 255, 0.02);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .font-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(176, 38, 255, 0.2), inset 0 0 15px rgba(255, 0, 255, 0.1);
            border-color: var(--neon-purple);
        }

        .font-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--dark-bg);
            padding: 0 8px;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            letter-spacing: 1px;
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
        }

        .font-card {
            position: relative;
        }

        .font-text {
            /* Standard-Schriftart fГјr die Generierung, damit Unicode nicht verfГӨlscht wird */
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 1.4rem;
            word-break: break-all;
            flex-grow: 1;
            padding-top: 5px;
        }

        /* Cyberpunk Button */
        .copy-btn {
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        .copy-btn:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background: rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-pink);
        }
    </style>
</head>
<body>

            { name: "SERIF ITALIC", chars: "рқ‘Һрқ‘Ҹрқ‘җрқ‘‘рқ‘’рқ‘“рқ‘”в„Һрқ‘–рқ‘—рқ‘ҳрқ‘ҷрқ‘ҡрқ‘ӣрқ‘ңрқ‘қрқ‘һрқ‘ҹрқ‘ рқ‘Ўрқ‘ўрқ‘Јрқ‘Өрқ‘Ҙрқ‘Ұрқ‘§рқҗҙрқҗөрқҗ¶рқҗ·рқҗёрқҗ№рқҗәрқҗ»рқҗјрқҗҪрқҗҫрқҗҝрқ‘Җрқ‘Ғрқ‘Ӯрқ‘ғрқ‘„рқ‘…рқ‘Ҷрқ‘Үрқ‘Ҳрқ‘үрқ‘Ҡрқ‘Ӣрқ‘Ңрқ‘Қ" },
            { name: "SERIF BOLD ITALIC", chars: "рқ’Ӯрқ’ғрқ’„рқ’…рқ’Ҷрқ’Үрқ’Ҳрқ’үрқ’Ҡрқ’Ӣрқ’Ңрқ’Қрқ’Һрқ’Ҹрқ’җрқ’‘рқ’’рқ’“рқ’”рқ’•рқ’–рқ’—рқ’ҳрқ’ҷрқ’ҡрқ’ӣрқ‘Ёрқ‘©рқ‘Әрқ‘«рқ‘¬рқ‘ӯрқ‘®рқ‘Ҝрқ‘°рқ‘ұрқ‘Ірқ‘ірқ‘ҙрқ‘өрқ‘¶рқ‘·рқ‘ёрқ‘№рқ‘әрқ‘»рқ‘јрқ‘Ҫрқ‘ҫрқ‘ҝрқ’Җрқ’Ғ" },

            { name: "FRAKTUR / GOTHIC", chars: "рқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”§рқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·рқ”„рқ”…рқ”Ҷрқ”Үрқ”Ҳрқ”үрқ”Ҡрқ”Ӣв„‘рқ”Қрқ”Һрқ”Ҹрқ”җрқ”‘рқ”’рқ”“рқ””в„ңрқ”–рқ”—рқ”ҳрқ”ҷрқ”ҡрқ”ӣрқ”ңв„Ё" },

            { name: "DOUBLE STRUCK", chars: "рқ•’рқ•“рқ•”рқ••рқ•–рқ•—рқ•ҳрқ•ҷрқ•ҡрқ•ӣрқ•ңрқ•қрқ•һрқ•ҹрқ• рқ•Ўрқ•ўрқ•Јрқ•Өрқ•Ҙрқ•Ұрқ•§рқ•Ёрқ•©рқ•Әрқ•«рқ”ёрқ”№в„Ӯрқ”»рқ”јрқ”Ҫрқ”ҫв„Қрқ•Җрқ•Ғрқ•Ӯрқ•ғрқ•„в„•рқ•Ҷв„ҷв„ҡв„қрқ•Ҡрқ•Ӣрқ•Ңрқ•Қрқ•Һрқ•Ҹрқ•җв„Ө" },

            { name: "DARK SQUARED", chars: "рҹ…°рҹ…ұрҹ…Ірҹ…ірҹ…ҙрҹ…өрҹ…¶рҹ…·рҹ…ёрҹ…№рҹ…әрҹ…»рҹ…јрҹ…Ҫрҹ…ҫрҹ…ҝрҹҶҖрҹҶҒрҹҶӮрҹҶғрҹҶ„рҹҶ…рҹҶҶрҹҶҮрҹҶҲрҹҶүрҹ…°рҹ…ұрҹ…Ірҹ…ірҹ…ҙрҹ…өрҹ…¶рҹ…·рҹ…ёрҹ…№рҹ…әрҹ…»рҹ…јрҹ…Ҫрҹ…ҫрҹ…ҝрҹҶҖрҹҶҒрҹҶӮрҹҶғрҹҶ„рҹҶ…рҹҶҶрҹҶҮрҹҶҲрҹҶү" },
            { name: "SMALL CAPS", chars: "бҙҖКҷбҙ„бҙ…бҙҮТ“ЙўКңЙӘбҙҠбҙӢКҹбҙҚЙҙбҙҸбҙҳЗ«КҖsбҙӣбҙңбҙ бҙЎxКҸбҙўбҙҖКҷбҙ„бҙ…бҙҮТ“ЙўКңЙӘбҙҠбҙӢКҹбҙҚЙҙбҙҸбҙҳЗ«КҖsбҙӣбҙңбҙ бҙЎxКҸбҙў" }
        ];

        const userInput = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');
        const toast = document.getElementById('toast');

        // Umwandlungsfunktion
        function transformText(text, targetChars) {
            const targetArray = Array.from(targetChars);
            let result = '';
            
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                let index = normalChars.indexOf(char);
                
                if (index !== -1) {
                    result += targetArray[index];
                } else {
                    result += char;
                }
            }
            return result;
        }

        // Generiert die UI-Karten
        function generateFonts() {
            const text = userInput.value;
            resultsContainer.innerHTML = '';

            if (!text) return;

            fonts.forEach(font => {
                const translatedText = transformText(text, font.chars);
                
                const card = document.createElement('div');
                card.className = 'font-card';
                
                const label = document.createElement('div');
                label.className = 'font-label';
                label.innerText = font.name;

                const textSpan = document.createElement('span');
                textSpan.className = 'font-text';
                textSpan.innerText = translatedText;
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerText = 'COPY';
                copyBtn.onclick = () => copyToClipboard(translatedText);
                
                card.appendChild(label);
                card.appendChild(textSpan);
                card.appendChild(copyBtn);
                resultsContainer.appendChild(card);
            });
        }

        // Copy & Toast Funktion
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.className = "show";
                setTimeout(() => { 
                    toast.className = toast.className.replace("show", ""); 
                }, 2000);
            }).catch(err => {
                console.error('Copy Failed: ', err);
            });
        }

        userInput.addEventListener('input', generateFonts);
    </script>
</body>
</html>
