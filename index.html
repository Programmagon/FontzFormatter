<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Generator</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }

        .input-container {
            margin-bottom: 2rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            font-size: 1.25rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        #results {
            display: grid;
            gap: 1rem;
        }

        .font-card {
            background-color: var(--card-bg);
            padding: 1.25rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .font-text {
            font-size: 1.25rem;
            word-break: break-all;
            flex-grow: 1;
        }

        .copy-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <h1>вңЁ Text Font Generator</h1>
    
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Type your text here..." autocomplete="off">
    </div>

    <div id="results">
        </div>

    <div id="toast">Copied to clipboard!</div>

    <script>
        // The standard alphabet
        const normalChars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";

        // Unicode mapping dictionaries
        const fonts = [
            { name: "Bold", chars: "рқ—®рқ—Ҝрқ—°рқ—ұрқ—Ірқ—ірқ—ҙрқ—өрқ—¶рқ—·рқ—ёрқ—№рқ—әрқ—»рқ—јрқ—Ҫрқ—ҫрқ—ҝрқҳҖрқҳҒрқҳӮрқҳғрқҳ„рқҳ…рқҳҶрқҳҮрқ—”рқ—•рқ—–рқ——рқ—ҳрқ—ҷрқ—ҡрқ—ӣрқ—ңрқ—қрқ—һрқ—ҹрқ— рқ—Ўрқ—ўрқ—Јрқ—Өрқ—Ҙрқ—Ұрқ—§рқ—Ёрқ—©рқ—Әрқ—«рқ—¬рқ—ӯ" },
            { name: "Italic", chars: "рқҳўрқҳЈрқҳӨрқҳҘрқҳҰрқҳ§рқҳЁрқҳ©рқҳӘрқҳ«рқҳ¬рқҳӯрқҳ®рқҳҜрқҳ°рқҳұрқҳІрқҳірқҳҙрқҳөрқҳ¶рқҳ·рқҳёрқҳ№рқҳәрқҳ»рқҳҲрқҳүрқҳҠрқҳӢрқҳҢрқҳҚрқҳҺрқҳҸрқҳҗрқҳ‘рқҳ’рқҳ“рқҳ”рқҳ•рқҳ–рқҳ—рқҳҳрқҳҷрқҳҡрқҳӣрқҳңрқҳқрқҳһрқҳҹрқҳ рқҳЎ" },
            { name: "Cursive", chars: "рқ“Әрқ“«рқ“¬рқ“ӯрқ“®рқ“Ҝрқ“°рқ“ұрқ“Ірқ“ірқ“ҙрқ“өрқ“¶рқ“·рқ“ёрқ“№рқ“әрқ“»рқ“јрқ“Ҫрқ“ҫрқ“ҝрқ”Җрқ”Ғрқ”Ӯрқ”ғрқ“җрқ“‘рқ“’рқ““рқ“”рқ“•рқ“–рқ“—рқ“ҳрқ“ҷрқ“ҡрқ“ӣрқ“ңрқ“қрқ“һрқ“ҹрқ“ рқ“Ўрқ“ўрқ“Јрқ“Өрқ“Ҙрқ“Ұрқ“§рқ“Ёрқ“©" },
            { name: "Fraktur", chars: "рқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”§рқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·рқ”„рқ”…рқ”Ҷрқ”Үрқ”Ҳрқ”үрқ”Ҡрқ”Ӣв„‘рқ”Қрқ”Һрқ”Ҹрқ”җрқ”‘рқ”’рқ”“рқ””в„ңрқ”–рқ”—рқ”ҳрқ”ҷрқ”ҡрқ”ӣрқ”ңв„Ё" },
            { name: "Monospace", chars: "рқҡҠрқҡӢрқҡҢрқҡҚрқҡҺрқҡҸрқҡҗрқҡ‘рқҡ’рқҡ“рқҡ”рқҡ•рқҡ–рқҡ—рқҡҳрқҡҷрқҡҡрқҡӣрқҡңрқҡқрқҡһрқҡҹрқҡ рқҡЎрқҡўрқҡЈрқҷ°рқҷұрқҷІрқҷірқҷҙрқҷөрқҷ¶рқҷ·рқҷёрқҷ№рқҷәрқҷ»рқҷјрқҷҪрқҷҫрқҷҝрқҡҖрқҡҒрқҡӮрқҡғрқҡ„рқҡ…рқҡҶрқҡҮрқҡҲрқҡү" },
            { name: "Double Struck", chars: "рқ•’рқ•“рқ•”рқ••рқ•–рқ•—рқ•ҳрқ•ҷрқ•ҡрқ•ӣрқ•ңрқ•қрқ•һрқ•ҹрқ• рқ•Ўрқ•ўрқ•Јрқ•Өрқ•Ҙрқ•Ұрқ•§рқ•Ёрқ•©рқ•Әрқ•«рқ”ёрқ”№в„Ӯрқ”»рқ”јрқ”Ҫрқ”ҫв„Қрқ•Җрқ•Ғрқ•Ӯрқ•ғрқ•„в„•рқ•Ҷв„ҷв„ҡв„қрқ•Ҡрқ•Ӣрқ•Ңрқ•Қрқ•Һрқ•Ҹрқ•җв„Ө" }
        ];

        const userInput = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');
        const toast = document.getElementById('toast');

        // Function to translate standard text to unicode text
        function transformText(text, targetChars) {
            // Array.from is used to safely split Unicode surrogate pairs
            const targetArray = Array.from(targetChars);
            let result = '';
            
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                let index = normalChars.indexOf(char);
                
                // If it's a letter, swap it. Otherwise, keep original (like spaces, numbers)
                if (index !== -1) {
                    result += targetArray[index];
                } else {
                    result += char;
                }
            }
            return result;
        }

        // Function to render the UI updates
        function generateFonts() {
            const text = userInput.value;
            resultsContainer.innerHTML = '';

            // If input is empty, show nothing
            if (!text) return;

            fonts.forEach(font => {
                const translatedText = transformText(text, font.chars);
                
                // Create card container
                const card = document.createElement('div');
                card.className = 'font-card';
                
                // Create text span
                const textSpan = document.createElement('span');
                textSpan.className = 'font-text';
                textSpan.innerText = translatedText;
                
                // Create copy button
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerText = 'Copy';
                copyBtn.onclick = () => copyToClipboard(translatedText);
                
                card.appendChild(textSpan);
                card.appendChild(copyBtn);
                resultsContainer.appendChild(card);
            });
        }

        // Function to copy text and show toast notification
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.className = "show";
                setTimeout(() => { 
                    toast.className = toast.className.replace("show", ""); 
                }, 2500);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        // Listen for typing events
        userInput.addEventListener('input', generateFonts);
    </script>
</body>
</html>
